name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - name: Install libhunspell
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libhunspell-dev

      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            setup.py
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests
        run: python -m pytest --tb=short -v

      - name: Verify package builds
        run: |
          pip install build twine
          python -m build
          twine check dist/*

  devcontainer-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build dev container
        run: docker build -t dutch-pluralizer-dev -f .devcontainer/Dockerfile .

      - name: Run tests in dev container
        run: docker run --rm dutch-pluralizer-dev python -m pytest --tb=short -q
