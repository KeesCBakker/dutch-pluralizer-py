name: Publish

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to publish'
        default: package+docker
        type: choice
        options:
          - package
          - docker
          - package+docker
      bump:
        description: 'Version bump type (none = keep current)'
        default: patch
        type: choice
        options:
          - none
          - patch
          - minor
          - major

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install libhunspell
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libhunspell-dev

      - uses: actions/setup-python@v7
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: |
            setup.py
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: python -m pytest --tb=short -q

  publish:
    if: ${{ github.event.inputs.mode == 'package' || github.event.inputs.mode == 'package+docker' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    needs: test

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install libhunspell
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libhunspell-dev

      - uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bumpversion build twine

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        if: ${{ github.event.inputs.bump != 'none' }}
        run: bumpversion ${{ github.event.inputs.bump }}

      - name: Push version bump and tag
        if: ${{ github.event.inputs.bump != 'none' }}
        run: git push origin master --follow-tags

      - name: Build package
        run: |
          python -m build
          pip install -q twine && twine check dist/*

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Get tag
        id: version
        run: echo "tag=v$(python setup.py --version)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        run: gh release create ${{ steps.version.outputs.tag }} dist/* --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  docker:
    if: ${{ github.event.inputs.mode == 'docker' || github.event.inputs.mode == 'package+docker' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    needs: [test, publish]

    steps:
      - uses: actions/checkout@v7

      - name: Get version
        id: version
        run: echo "tag=v$(python setup.py --version)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ghcr
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
