name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install libhunspell
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libhunspell-dev

      - uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bumpversion build twine

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: bumpversion ${{ github.event.inputs.bump }}

      - name: Push version bump and tag
        run: git push origin master --follow-tags

      - name: Get tag from setup.py
        id: version
        run: echo "tag=v$(python setup.py --version)" >> $GITHUB_OUTPUT

      - name: Build package
        run: |
          python -m build
          twine check dist/*

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload --verbose dist/*

      - name: Create GitHub Release
        run: gh release create ${{ steps.version.outputs.tag }} dist/* --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
